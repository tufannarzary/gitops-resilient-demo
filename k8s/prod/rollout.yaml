apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
 name: app-prod
spec:
 replicas: 2


 selector:
   matchLabels:
     app: app-prod


 template:
   metadata:
     labels:
       app: app-prod
   spec:
     containers:
     - name: nginx
       image: nginx:1.25
       ports:
       - containerPort: 80
       volumeMounts:
       - name: html
         mountPath: /usr/share/nginx/html
     volumes:
     - name: html
       configMap:
         name: feature-config


 strategy:
   canary:
     steps:
     - setWeight: 20
     - pause: {}
